<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>北极星登录</title>
  <style>
    :root{--blue:#2b57d9;--blue-deep:#2348bf;--blue-soft:#5e8cff;--card:#ffffff;--text:#111827;--sub:#667085;--line:rgba(15,23,42,.08);--shadow:0 28px 64px rgba(9,30,66,.22);--radius-xl:34px;--radius-lg:24px;--radius-md:18px}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;font:14px "SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;color:#fff;background:radial-gradient(circle at 20% 22%,rgba(255,255,255,.12),transparent 18%),radial-gradient(circle at 68% 40%,rgba(145,196,255,.22),transparent 24%),linear-gradient(135deg,var(--blue) 0%,var(--blue-deep) 100%)}
    button,input{font:inherit}button{border:0;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}button:hover{transform:translateY(-1px)}input{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#eef3ff;color:var(--text);outline:none}input:focus{border-color:rgba(43,87,217,.3);box-shadow:0 0 0 4px rgba(43,87,217,.08)}
    .page{min-height:100%;display:grid;grid-template-rows:1fr auto}.shell{padding:32px 38px 20px;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(360px,480px);gap:28px;align-items:center}
    .brand{display:grid;gap:22px;align-content:start}.brand-head{width:min(360px,100%)}.brand-head svg{display:block;width:100%;height:auto}.brand-copy h1{margin:0;font-size:clamp(42px,5vw,68px);line-height:1.04;letter-spacing:-.06em}.brand-copy p{margin:16px 0 0;max-width:640px;line-height:1.9;color:rgba(255,255,255,.82)}
    .scene{position:relative;min-height:420px;display:grid;place-items:center}.scene-base{position:absolute;inset:auto 6% 12% 6%;height:150px;border-radius:999px;background:linear-gradient(180deg,rgba(196,223,255,.5),rgba(196,223,255,.16));filter:blur(.5px)}.scene-card{position:absolute;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(18px)}.scene-card.a{left:4%;top:24%;width:180px;height:110px;transform:rotate(-11deg)}.scene-card.b{left:28%;bottom:14%;width:240px;height:120px}.scene-card.c{right:10%;top:16%;width:220px;height:160px}.scene-card:before{content:"";position:absolute;left:22px;right:22px;top:28px;height:8px;border-radius:999px;background:rgba(255,255,255,.34)}.scene-card:after{content:"";position:absolute;left:22px;right:40px;bottom:28px;height:54px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,.1))}
    .scene-center{position:relative;z-index:2;width:min(360px,64%);display:grid;place-items:center}.scene-center svg{display:block;width:100%;height:auto}
    .login-card{position:relative;background:var(--card);color:var(--text);border-radius:var(--radius-xl);padding:34px 34px 30px;box-shadow:var(--shadow);overflow:hidden}
    .login-card:before{content:"";position:absolute;right:-32px;top:-32px;width:160px;height:160px;border-radius:28px;background:linear-gradient(135deg,rgba(43,87,217,.18),rgba(94,140,255,.28));transform:rotate(45deg)}
    .login-head{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:24px}.login-head h2{margin:0;font-size:34px;line-height:1.04;letter-spacing:-.05em}.login-head p{margin:10px 0 0;color:var(--sub);line-height:1.8}.login-tag{padding:8px 12px;border-radius:999px;background:rgba(43,87,217,.08);color:var(--blue);font-size:12px;font-weight:700;white-space:nowrap}
    .field{margin-bottom:16px}.field label{display:block;margin-bottom:8px;color:#344054;font-size:13px;font-weight:600}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 20px;color:var(--sub);font-size:13px}.check{display:inline-flex;align-items:center;gap:8px;cursor:pointer}.check input{width:16px;height:16px;accent-color:var(--blue)}
    .submit{width:100%;border-radius:14px;padding:14px 18px;background:linear-gradient(180deg,#2d6bff,#1558d8);color:#fff;font-weight:700;box-shadow:0 16px 30px rgba(45,107,255,.18)}.submit:disabled{opacity:.72;cursor:wait}.notice{min-height:22px;margin-top:14px;color:#c01048;font-size:13px}
    .links{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:18px;color:var(--sub);font-size:13px}.links a{color:var(--blue);text-decoration:none}.foot{padding:0 24px 12px;text-align:center;color:rgba(255,255,255,.76);font-size:12px;line-height:1.8}
    .transition{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(180deg,rgba(248,250,255,.92),rgba(243,246,252,.98));opacity:0;visibility:hidden;transition:opacity .28s ease,visibility .28s ease;z-index:20}.transition.show{opacity:1;visibility:visible}.transition-card{padding:22px 24px;border-radius:28px;background:rgba(255,255,255,.92);box-shadow:0 24px 54px rgba(15,23,42,.12);display:grid;justify-items:center;gap:12px}.transition-card svg{display:block;width:48px;height:48px}.transition-card strong{color:#0f172a;font-size:16px}.transition-card span{color:#667085;font-size:12px}.transition-bar{width:138px;height:5px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden}.transition-bar:before{content:"";display:block;width:44%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#2d6bff,#68b7ff);animation:move 1.05s ease-in-out infinite}@keyframes move{0%{transform:translateX(-115%)}100%{transform:translateX(330%)}}
    @media (max-width:1080px){.shell{grid-template-columns:1fr;padding:22px 22px 18px}.scene{min-height:280px}.scene-center{width:min(260px,58%)}.login-card{max-width:560px;width:100%;justify-self:center}}@media (max-width:720px){.shell{padding:14px 14px 12px}.login-card{padding:28px 22px 24px}.brand-copy h1{font-size:42px}.scene{min-height:220px}.links{flex-direction:column}}
  
    /* Polaris SaaS Baseline Override */
    :root{--text:#111827;--sub:#6b7280;--cta:#dbeafe;--cta-border:rgba(147,197,253,.58);--cta-text:#1d4ed8;--line:rgba(15,23,42,.08);--shadow:0 18px 40px rgba(15,23,42,.08)}
    body{color:var(--text);font:14px "Avenir Next","HarmonyOS Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fafafa 0%,#f3f4f6 100%)}
    .page{position:relative;overflow:hidden}.page:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 12% 18%,rgba(15,23,42,.06),transparent 24%),radial-gradient(circle at 88% 10%,rgba(219,234,254,.92),transparent 20%);pointer-events:none}
    .shell{padding:28px 32px 20px;grid-template-columns:minmax(0,1.08fr) minmax(360px,460px);gap:40px}.brand{gap:28px}.brand-copy h1{color:var(--text);font-size:clamp(38px,5vw,60px)}.brand-copy p{color:var(--sub);max-width:640px}
    .scene-base{background:linear-gradient(180deg,rgba(15,23,42,.08),rgba(15,23,42,.03))}.scene-card{background:rgba(255,255,255,.72);border:1px solid rgba(15,23,42,.08);box-shadow:0 14px 30px rgba(15,23,42,.05);backdrop-filter:blur(18px)}.scene-card:before{background:rgba(15,23,42,.12)}.scene-card:after{background:linear-gradient(180deg,rgba(15,23,42,.08),rgba(15,23,42,.03))}
    .login-card{background:rgba(255,255,255,.98);border:1px solid rgba(15,23,42,.08);border-radius:32px;padding:36px 36px 32px;box-shadow:var(--shadow)}.login-card:before{right:-52px;top:-52px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(219,234,254,.92),transparent 64%);transform:none}
    .login-head{margin-bottom:26px}.login-head h2{font-size:32px}.login-head p,.row,.links,.foot{color:var(--sub)}.login-tag{background:rgba(15,23,42,.05);color:#4b5563}
    input{background:rgba(255,255,255,.96);border:1px solid rgba(15,23,42,.08);border-radius:16px;padding:15px 16px}.field label{color:#374151}.check input{accent-color:#93c5fd}input:focus{border-color:rgba(15,23,42,.12);box-shadow:0 0 0 4px rgba(15,23,42,.05)}
    .submit{background:linear-gradient(180deg,#eff6ff,var(--cta));color:var(--cta-text);border:1px solid var(--cta-border);box-shadow:0 10px 24px rgba(147,197,253,.18)}.links a{color:var(--cta-text)}
    .transition{background:linear-gradient(180deg,rgba(250,250,250,.96),rgba(244,244,245,.98))}.transition-card{background:rgba(255,255,255,.94);border:1px solid rgba(15,23,42,.08);box-shadow:0 18px 40px rgba(15,23,42,.08)}
    @media (max-width:1080px){.shell{padding:20px 20px 16px;gap:28px}}@media (max-width:720px){.shell{padding:14px 14px 12px}.login-card{padding:28px 22px 24px}}

  </style>
</head>
<body>
  <div class="transition" id="pageTransition" aria-hidden="true">
      <div class="transition-card">
      __BI_LOGO_BADGE__
      <strong>北极星经营中心</strong>
      <span>登录中，请稍候...</span>
      <div class="transition-bar"></div>
    </div>
  </div>
  <div class="page">
    <div class="shell">
      <section class="brand">
        <div class="brand-head">__BI_LOGO_WORDMARK__</div>
        <div class="brand-copy">
          <h1>让经营数据进入可直接决策的界面。</h1>
          <p>新的登录页沿用了你参考图里的蓝色视觉方向，左侧强化品牌和系统感，右侧把登录动作收束到干净的白色卡片里。进入系统后会直达经营中心，并且后续页面切换都带缓冲过渡。</p>
        </div>
        <div class="scene" aria-hidden="true">
          <div class="scene-base"></div>
          <div class="scene-card a"></div>
          <div class="scene-card b"></div>
          <div class="scene-card c"></div>
          <div class="scene-center">__BI_LOGO_BADGE__</div>
        </div>
      </section>
      <section class="login-card">
        <div class="login-head">
          <div>
            <h2>账号登录</h2>
            <p>使用已经配置好的本地测试账号或管理员账号进入北极星经营中心。</p>
          </div>
          <span class="login-tag">安全登录</span>
        </div>
        <form id="loginForm">
          <div class="field">
            <label for="username">登录账号</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入用户名" required />
          </div>
          <div class="field">
            <label for="password">登录密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          </div>
          <div class="row">
            <label class="check"><input id="remember" type="checkbox" /><span>记住本设备</span></label>
            <span>会话登录已替代浏览器 Basic Auth</span>
          </div>
          <button class="submit" id="submitBtn" type="submit">立即登录</button>
          <div class="notice" id="notice"></div>
        </form>
        <div class="links">
          <span>登录成功后会自动回到你刚才访问的页面。</span>
          <a href="/financial/bi-dashboard">先查看首页</a>
        </div>
      </section>
    </div>
    <div class="foot">北极星经营中心 · 登录与页面切换已统一为自然过渡体验。</div>
  </div>
  <script>
    const NEXT_PATH=__NEXT_PATH_JSON__,form=document.getElementById("loginForm"),submitBtn=document.getElementById("submitBtn"),notice=document.getElementById("notice"),transition=document.getElementById("pageTransition");
    const showTransition=()=>transition.classList.add("show");
    form.addEventListener("submit",async(event)=>{event.preventDefault();notice.textContent="";submitBtn.disabled=true;submitBtn.textContent="登录中...";try{const payload={username:document.getElementById("username").value.trim(),password:document.getElementById("password").value,remember:document.getElementById("remember").checked,next:NEXT_PATH};const response=await fetch("/financial/bi-dashboard/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});if(!response.ok){const data=await response.json().catch(()=>({}));throw new Error(data.detail||"登录失败")}const data=await response.json();showTransition();setTimeout(()=>{window.location.href=data.redirect_to||"/financial/bi-dashboard"},240)}catch(error){notice.textContent=error.message||"登录失败"}finally{submitBtn.disabled=false;submitBtn.textContent="立即登录"}});
  </script>
</body>
</html>
