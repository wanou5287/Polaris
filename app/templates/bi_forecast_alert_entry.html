<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>销售预测与安全库存预警</title>
  <style>
    :root {
      --bg: #eef3ec;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(15, 23, 42, 0.08);
      --text: #111827;
      --sub: #667085;
      --accent: #1f6dff;
      --shadow-md: 0 18px 36px rgba(24, 32, 56, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(31, 109, 255, 0.12), transparent 26%),
        radial-gradient(circle at 100% 12%, rgba(18, 183, 106, 0.1), transparent 22%),
        linear-gradient(180deg, #f5f8f3 0%, var(--bg) 100%);
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    button:hover { transform: translateY(-1px); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 14px;
      background: rgba(248, 250, 252, 0.96);
      color: var(--text);
      outline: none;
    }
    .shell {
      min-height: 100vh;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .glass {
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-md);
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-radius: var(--radius-xl);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #d8f2e2, #8cc9a3);
      color: #104f31;
      font-weight: 700;
    }
    .brand h1 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: -0.04em;
    }
    .brand p {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .pill, .primary, .ghost {
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 13px;
    }
    .pill, .ghost {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .primary {
      color: #fff;
      background: linear-gradient(180deg, #2c77ff, #1558d8);
      box-shadow: 0 14px 28px rgba(31, 109, 255, 0.2);
    }
    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 109, 255, 0.08);
      color: #1757cc;
      font-size: 12px;
      font-weight: 600;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .metric-card {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(255,255,255,.98), rgba(247,250,255,.78));
      border: 1px solid rgba(255,255,255,.76);
    }
    .metric-card span {
      color: var(--sub);
      font-size: 12px;
    }
    .metric-card strong {
      display: block;
      margin-top: 8px;
      font-size: 24px;
      letter-spacing: -0.04em;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 420px) minmax(360px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      padding: 18px;
      border-radius: var(--radius-lg);
    }
    .panel h2, .panel h3 {
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }
    .panel p, .helper {
      margin: 0;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.7;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .field-row label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 14px;
    }
    .toolbar .field-row { min-width: 150px; flex: 1 1 150px; }
    .notice {
      min-height: 22px;
      color: #1558d8;
      font-size: 13px;
    }
    .notice.error { color: #d92d20; }
    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255, 255, 255, 0.76);
      max-height: 700px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(247, 249, 253, 0.95);
      color: var(--sub);
      font-weight: 600;
    }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: rgba(31, 109, 255, 0.04); }
    .event-row {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) 100px 100px 110px auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .event-row .pill {
      padding: 8px 12px;
    }
    @media (max-width: 1380px) {
      .workspace, .metric-grid, .field-grid { grid-template-columns: 1fr; }
      .event-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .shell { padding: 14px; }
      .topbar { grid-template-columns: 1fr; }
      .top-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar glass">
      <div class="brand">
        <div class="brand-mark">预测</div>
        <div>
          <h1>销售预测与安全库存预警</h1>
          <p>支持手动预测、AI 按历史销量/翻新领料 + 季节性 + 618/双11 等促销活动做预测，并在安全库存覆盖天数低于 14 天时生成预警并推送到钉钉。</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="ghost" id="refreshBtn">刷新</button>
        <button class="ghost" id="backBtn">返回看板</button>
        <button class="primary" id="recalcBtn">立即重算并推送</button>
        <span class="user-chip" id="currentUserChip"></span>
        <button class="ghost" id="logoutBtn">退出</button>
      </div>
    </header>

    <section class="metric-grid">
      <div class="metric-card glass"><span>启用物料数</span><strong id="profileCountMetric">0</strong></div>
      <div class="metric-card glass"><span>促销事件数</span><strong id="eventCountMetric">0</strong></div>
      <div class="metric-card glass"><span>预警条数</span><strong id="alertCountMetric">0</strong></div>
      <div class="metric-card glass"><span>最新预测日期</span><strong id="forecastDateMetric">-</strong></div>
      <div class="metric-card glass"><span>最新预警快照</span><strong id="alertDateMetric">-</strong></div>
    </section>

    <main class="workspace">
      <section class="panel glass">
        <h2>手动预测</h2>
        <p>手动预测会覆盖同一天、同物料、同需求类型的 AI 预测值。</p>
        <div class="stack" style="margin-top: 14px;">
          <div class="field-grid">
            <div class="field-row">
              <label for="manualForecastDate">预测日期</label>
              <input id="manualForecastDate" type="date" />
            </div>
            <div class="field-row">
              <label for="manualDemandType">需求类型</label>
              <select id="manualDemandType">
                <option value="sales">销售（整机）</option>
                <option value="refurb">翻新生产（非整机物料）</option>
              </select>
            </div>
            <div class="field-row" style="grid-column: 1 / -1;">
              <label for="manualMaterialName">物料名称</label>
              <input id="manualMaterialName" list="materialOptions" type="text" placeholder="从已有物料中选择或直接输入" />
              <datalist id="materialOptions"></datalist>
            </div>
            <div class="field-row">
              <label for="manualQty">手动预测值</label>
              <input id="manualQty" type="number" min="0" step="0.01" />
            </div>
            <div class="field-row">
              <label for="manualNotes">备注</label>
              <input id="manualNotes" type="text" placeholder="例如 渠道备货 / 直播活动" />
            </div>
          </div>
          <button class="pill" id="saveManualBtn">保存手动预测</button>
          <div class="notice" id="manualNotice"></div>
          <div id="manualTableWrap" class="table-wrap"></div>
        </div>
      </section>

      <section class="panel glass">
        <h2>促销事件系数</h2>
        <p>用于给 AI 预测叠加大促影响。默认已预置 618 和双11，可直接调整系数或禁用。</p>
        <div class="stack" style="margin-top: 14px;">
          <div id="eventEditor"></div>
          <div class="toolbar">
            <button class="pill" id="addEventBtn">新增促销事件</button>
            <button class="pill" id="saveEventsBtn">保存促销事件</button>
          </div>
          <div class="notice" id="eventNotice"></div>
        </div>
      </section>

      <section class="panel glass">
        <h2>AI 预测与库存预警</h2>
        <p>AI 预测会综合历史销量/翻新领料、周内季节性和促销系数；安全库存预警按最新良品库存与未来 14 天需求比较。</p>
        <div class="stack" style="margin-top: 14px;">
          <div class="toolbar">
            <div class="field-row">
              <label for="forecastStartDate">预测开始日期</label>
              <input id="forecastStartDate" type="date" />
            </div>
            <div class="field-row">
              <label for="forecastEndDate">预测结束日期</label>
              <input id="forecastEndDate" type="date" />
            </div>
          </div>
          <div class="notice" id="overviewNotice"></div>
          <div id="forecastTableWrap" class="table-wrap"></div>
          <div id="alertTableWrap" class="table-wrap"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const CURRENT_USER = __BI_CURRENT_USER_JSON__;
    const DASHBOARD_PATH = __BI_DASHBOARD_PATH_JSON__;
    const LOGOUT_PATH = __BI_LOGOUT_PATH_JSON__;
    const OVERVIEW_API = "/financial/bi-dashboard/api/forecast-alerts/overview";
    const MANUAL_API = "/financial/bi-dashboard/api/forecast-alerts/manual";
    const EVENTS_API = "/financial/bi-dashboard/api/forecast-alerts/events";
    const RECALC_API = "/financial/bi-dashboard/api/forecast-alerts/recalculate";

    const el = {
      currentUserChip: document.getElementById("currentUserChip"),
      refreshBtn: document.getElementById("refreshBtn"),
      backBtn: document.getElementById("backBtn"),
      recalcBtn: document.getElementById("recalcBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      profileCountMetric: document.getElementById("profileCountMetric"),
      eventCountMetric: document.getElementById("eventCountMetric"),
      alertCountMetric: document.getElementById("alertCountMetric"),
      forecastDateMetric: document.getElementById("forecastDateMetric"),
      alertDateMetric: document.getElementById("alertDateMetric"),
      materialOptions: document.getElementById("materialOptions"),
      manualForecastDate: document.getElementById("manualForecastDate"),
      manualDemandType: document.getElementById("manualDemandType"),
      manualMaterialName: document.getElementById("manualMaterialName"),
      manualQty: document.getElementById("manualQty"),
      manualNotes: document.getElementById("manualNotes"),
      saveManualBtn: document.getElementById("saveManualBtn"),
      manualNotice: document.getElementById("manualNotice"),
      manualTableWrap: document.getElementById("manualTableWrap"),
      eventEditor: document.getElementById("eventEditor"),
      addEventBtn: document.getElementById("addEventBtn"),
      saveEventsBtn: document.getElementById("saveEventsBtn"),
      eventNotice: document.getElementById("eventNotice"),
      forecastStartDate: document.getElementById("forecastStartDate"),
      forecastEndDate: document.getElementById("forecastEndDate"),
      overviewNotice: document.getElementById("overviewNotice"),
      forecastTableWrap: document.getElementById("forecastTableWrap"),
      alertTableWrap: document.getElementById("alertTableWrap"),
    };

    const state = {
      profiles: [],
      events: [],
      alerts: [],
      forecasts: [],
      manualRows: [],
    };

    async function api(url, options = {}) {
      const response = await fetch(url, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.detail || payload.message || `请求失败: ${response.status}`);
      }
      return payload;
    }

    function setNotice(target, message = "", isError = false) {
      target.textContent = message;
      target.className = `notice${isError ? " error" : ""}`;
    }

    function formatDate(value) {
      if (!value) return "-";
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? value : parsed.toLocaleDateString("zh-CN");
    }

    function formatNumber(value, digits = 2) {
      const parsed = Number(value || 0);
      return parsed.toLocaleString("zh-CN", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }

    function formatRate(value) {
      return `${(Number(value || 0) * 100).toLocaleString("zh-CN", { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%`;
    }

    function renderProfileOptions() {
      el.materialOptions.innerHTML = state.profiles
        .map((row) => `<option value="${row.material_name}">${row.material_name}</option>`)
        .join("");
    }

    function renderMetrics(summary) {
      el.profileCountMetric.textContent = String(summary.profile_count || 0);
      el.eventCountMetric.textContent = String(summary.event_count || 0);
      el.alertCountMetric.textContent = String(summary.alert_count || 0);
      el.forecastDateMetric.textContent = formatDate(summary.latest_forecast_date);
      el.alertDateMetric.textContent = formatDate(summary.latest_alert_date);
    }

    function renderManualTable(rows) {
      if (!rows.length) {
        el.manualTableWrap.innerHTML = `<div style="padding:18px;color:#667085;">暂无手动预测。</div>`;
        return;
      }
      el.manualTableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>预测日期</th>
              <th>需求类型</th>
              <th>物料名称</th>
              <th>手动预测值</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr class="clickable" data-row='${JSON.stringify(row).replace(/'/g, "&apos;")}'>
                <td>${row.forecast_date}</td>
                <td>${row.demand_type === "sales" ? "销售" : "翻新"}</td>
                <td>${row.material_name}</td>
                <td>${formatNumber(row.manual_qty)}</td>
                <td>${row.notes || ""}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      el.manualTableWrap.querySelectorAll("tbody tr").forEach((rowEl) => {
        rowEl.addEventListener("click", () => {
          const row = JSON.parse(rowEl.dataset.row.replace(/&apos;/g, "'"));
          el.manualForecastDate.value = row.forecast_date || "";
          el.manualDemandType.value = row.demand_type || "sales";
          el.manualMaterialName.value = row.material_name || "";
          el.manualQty.value = row.manual_qty ?? "";
          el.manualNotes.value = row.notes || "";
        });
      });
    }

    function renderEventEditor(rows) {
      el.eventEditor.innerHTML = rows.map((row, index) => `
        <div class="event-row" data-index="${index}">
          <input data-field="event_name" value="${row.event_name || ""}" placeholder="事件名称" />
          <input data-field="month_day_start" value="${row.month_day_start || ""}" placeholder="06-01" />
          <input data-field="month_day_end" value="${row.month_day_end || ""}" placeholder="06-20" />
          <input data-field="uplift_factor" type="number" min="0.1" step="0.01" value="${row.uplift_factor ?? 1}" />
          <button class="pill" data-remove-index="${index}">移除</button>
        </div>
      `).join("");
      el.eventEditor.querySelectorAll("[data-remove-index]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.removeIndex);
          state.events.splice(index, 1);
          renderEventEditor(state.events);
        });
      });
      el.eventEditor.querySelectorAll(".event-row").forEach((rowEl) => {
        rowEl.querySelectorAll("input").forEach((input) => {
          input.addEventListener("input", () => {
            const idx = Number(rowEl.dataset.index);
            state.events[idx][input.dataset.field] = input.value;
          });
        });
      });
    }

    function renderForecastTable(rows) {
      if (!rows.length) {
        el.forecastTableWrap.innerHTML = `<div style="padding:18px;color:#667085;">暂无预测结果。</div>`;
        return;
      }
      el.forecastTableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>预测日期</th>
              <th>物料名称</th>
              <th>需求类型</th>
              <th>AI预测值</th>
              <th>手动预测值</th>
              <th>最终预测值</th>
              <th>季节性系数</th>
              <th>促销系数</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td>${row.forecast_date}</td>
                <td>${row.material_name}</td>
                <td>${row.demand_type === "sales" ? "销售" : "翻新"}</td>
                <td>${formatNumber(row.ai_qty, 2)}</td>
                <td>${row.manual_qty == null ? "-" : formatNumber(row.manual_qty, 2)}</td>
                <td>${formatNumber(row.final_qty, 2)}</td>
                <td>${formatNumber(row.weekday_factor, 3)}</td>
                <td>${formatNumber(row.promo_factor, 3)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderAlertTable(rows) {
      if (!rows.length) {
        el.alertTableWrap.innerHTML = `<div style="padding:18px;color:#667085;">当前没有低于 14 天覆盖天数的预警。</div>`;
        return;
      }
      el.alertTableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>物料名称</th>
              <th>需求类型</th>
              <th>当前良品库存</th>
              <th>未来14天需求</th>
              <th>覆盖天数</th>
              <th>钉钉推送</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td>${row.material_name}</td>
                <td>${row.demand_type === "sales" ? "销售" : "翻新"}</td>
                <td>${formatNumber(row.current_stock_qty, 2)}</td>
                <td>${formatNumber(row.forecast_14d_qty, 2)}</td>
                <td>${formatNumber(row.coverage_days, 2)}</td>
                <td>${row.pushed_to_dingtalk ? "已推送" : "未推送"}${row.push_result ? ` / ${row.push_result}` : ""}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function collectManualPayload() {
      return {
        forecast_date: el.manualForecastDate.value,
        demand_type: el.manualDemandType.value,
        material_name: el.manualMaterialName.value,
        manual_qty: el.manualQty.value,
        notes: el.manualNotes.value,
      };
    }

    function filteredForecastRows() {
      const startDate = el.forecastStartDate.value;
      const endDate = el.forecastEndDate.value;
      return state.forecasts.filter((row) => {
        if (startDate && row.forecast_date < startDate) return false;
        if (endDate && row.forecast_date > endDate) return false;
        return true;
      });
    }

    async function loadManualRows() {
      const payload = await api(MANUAL_API);
      state.manualRows = payload.rows || [];
      renderManualTable(state.manualRows);
    }

    async function loadOverview(showNotice = false) {
      const payload = await api(OVERVIEW_API);
      state.profiles = payload.profiles || [];
      state.events = payload.events || [];
      state.alerts = payload.alerts || [];
      state.forecasts = payload.forecasts || [];
      renderProfileOptions();
      renderMetrics(payload.summary || {});
      renderEventEditor(state.events);
      renderForecastTable(filteredForecastRows());
      renderAlertTable(state.alerts);
      if (showNotice) {
        setNotice(el.overviewNotice, "预测结果与预警状态已刷新。");
      }
    }

    async function saveManualForecast() {
      el.saveManualBtn.disabled = true;
      try {
        const payload = await api(MANUAL_API, {
          method: "POST",
          body: JSON.stringify(collectManualPayload()),
        });
        await Promise.all([loadManualRows(), loadOverview(false)]);
        setNotice(el.manualNotice, payload.message || "手动预测已保存。");
      } catch (error) {
        setNotice(el.manualNotice, error.message, true);
      } finally {
        el.saveManualBtn.disabled = false;
      }
    }

    async function saveEvents() {
      el.saveEventsBtn.disabled = true;
      try {
        const payload = await api(EVENTS_API, {
          method: "PUT",
          body: JSON.stringify({ rows: state.events }),
        });
        await loadOverview(false);
        setNotice(el.eventNotice, payload.message || "促销事件已保存。");
      } catch (error) {
        setNotice(el.eventNotice, error.message, true);
      } finally {
        el.saveEventsBtn.disabled = false;
      }
    }

    async function recalculateForecasts() {
      el.recalcBtn.disabled = true;
      try {
        const payload = await api(RECALC_API, { method: "POST" });
        await Promise.all([loadOverview(false), loadManualRows()]);
        setNotice(el.overviewNotice, `${payload.message || "已完成重算"}。预警数：${payload.result?.alert_rows || 0}`);
      } catch (error) {
        setNotice(el.overviewNotice, error.message, true);
      } finally {
        el.recalcBtn.disabled = false;
      }
    }

    async function logout() {
      try {
        const payload = await api(LOGOUT_PATH, { method: "POST" });
        window.location.href = payload.redirect_to || "/financial/bi-dashboard/login";
      } catch (error) {
        setNotice(el.overviewNotice, error.message, true);
      }
    }

    function bindEvents() {
      el.refreshBtn.addEventListener("click", () => Promise.all([loadOverview(true), loadManualRows()]).catch((error) => setNotice(el.overviewNotice, error.message, true)));
      el.backBtn.addEventListener("click", () => { window.location.href = DASHBOARD_PATH; });
      el.recalcBtn.addEventListener("click", recalculateForecasts);
      el.logoutBtn.addEventListener("click", logout);
      el.saveManualBtn.addEventListener("click", saveManualForecast);
      el.addEventBtn.addEventListener("click", () => {
        state.events.push({ event_name: "", month_day_start: "", month_day_end: "", uplift_factor: 1, is_enabled: true });
        renderEventEditor(state.events);
      });
      el.saveEventsBtn.addEventListener("click", saveEvents);
      el.forecastStartDate.addEventListener("change", () => renderForecastTable(filteredForecastRows()));
      el.forecastEndDate.addEventListener("change", () => renderForecastTable(filteredForecastRows()));
    }

    async function init() {
      el.currentUserChip.textContent = CURRENT_USER || "北极星用户";
      bindEvents();
      try {
        await Promise.all([loadOverview(false), loadManualRows()]);
      } catch (error) {
        setNotice(el.overviewNotice, error.message, true);
      }
    }

    init();
  </script>
</body>
</html>
