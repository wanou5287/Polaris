# Replace these placeholders with your real tenant settings before running.
yonyou:
  base_url: "https://c3.yonyoucloud.com"
  app_key: "${YONYOU_APP_KEY}"
  app_secret: "${YONYOU_APP_SECRET}"
  tenant_id: ""
  gateway_prefix: "/iuap-api-gateway"
  auth_path: "/iuap-api-auth/open-auth/selfAppAuth/getAccessToken"
  request_timeout_seconds: 30
  verify_ssl: true
  max_retries: 3
  token_refresh_skew_seconds: 300

  inventory:
    path: "/yonbip/scm/stock/QueryCurrentStocksByCondition"
    access_token_mode: "query"
    result_list_paths:
      - "data.recordList"
      - "data.rows"
      - "data.list"
      - "data.items"
      - "data"
    filters:
      org: ""
      warehouse: ""
      product: ""
      productsku: ""
      stockStatusDoc: ""
      store: ""
      batchno: ""
      bStockStatusDocNotNull: false
      billnum: ""

  salesout:
    path: "/yonbip/scm/salesout/list"
    access_token_mode: "query"
    page_size: 100
    result_list_paths:
      - "data.recordList"
      - "data.rows"
      - "data.list"
      - "data.items"
      - "data"
    filters:
      isSum: false
      stockOrg: ""
      salesOrg: ""
      warehouse: ""
      cust: ""
      product_cName: ""
      operator: ""
      department: ""

database:
  url: "mysql+pymysql://root:ReplaceMe@127.0.0.1:3306/bi_center?charset=utf8mb4"

job:
  cron: ""
  sales_days_behind: 1
  sales_window_days: 1
  snapshot_days_behind: 0

logging:
  level: "INFO"
  file: "logs/yonyou_inventory_sync.log"
