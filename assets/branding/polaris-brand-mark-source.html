<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=512, initial-scale=1" />
<style>
  html, body {
    margin: 0;
    width: 512px;
    height: 512px;
    background: #ffffff;
    overflow: hidden;
  }
  .frame {
    width: 512px;
    height: 512px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
  }
  .mark {
    position: relative;
    width: 440px;
    height: 440px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 96px;
    border: 1px solid rgba(0,0,0,0.08);
    background: linear-gradient(145deg,#050505 0%,#111111 58%,#2a2a2a 100%);
    box-shadow: 0 10px 18px rgba(15,23,42,0.14);
  }
  .mark::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,rgba(255,255,255,0.08),transparent 34%);
  }
  .mark svg {
    position: relative;
    z-index: 1;
    width: 72%;
    height: 72%;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="polaris-star" x1="12%" y1="8%" x2="84%" y2="92%">
            <stop offset="0%" stop-color="#f5f5f5" />
            <stop offset="52%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#e5e5e5" />
          </linearGradient>
        </defs>
        <path d="M24 6.5l2.8 11.7L38.5 21l-11.7 2.8L24 35.5l-2.8-11.7L9.5 21l11.7-2.8L24 6.5z" fill="url(#polaris-star)"/>
        <circle cx="35.8" cy="13.6" r="2.1" fill="#f5f5f5" />
        <path d="M33.6 9.7c2.7.5 4.7 2.1 5.8 4.5" fill="none" stroke="rgba(255,255,255,0.76)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</body>
</html>
