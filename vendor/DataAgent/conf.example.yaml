# Application Settings
app:
  locale: "en-US"                       # Default locale ("en-US" | "zh-CN")
  max_steps: 6                          # Max steps allowed in planning
  max_retry_count: 3                    # LLM retry count (e.g., JSON parsing retry)
  max_replan_count: 10                  # Max replanning attempts
  plan_temperature: 1.0                 # Planning temperature
  query_limit: 1000000                  # Upper bound for generic table query results
  workspace_directory:                  # Root workspace dir for per-session subdirectories
    linux: "/data/data_agent"
    windows: "D:/data_agent"
  csv_data_directory:                   # CSV base directory (for scanning file/columns)
    linux: "/data/csv_files"
    windows: "D:/csv_files"

# LLM configuration per agent (OpenAI-compatible)
# Tip: Use environment variables like "$OPENAI_API_KEY"
llm:
  react_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  report_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  small_talk_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  intent_recognition_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  plan_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  analysis_agent:
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

  extract:
    # Used for keyword extraction and RAG prompt assistance
    base_url: https://api.openai.com/v1
    model: "gpt-4o-mini"
    api_key: "$OPENAI_API_KEY"

# Database Configuration
database:
  mysql:
    host: "127.0.0.1"
    port: 3306
    user: "readonly_user"
    password: "$MYSQL_PASSWORD"
    database: "analytics"

# Agent configuration
agents:
  # High-level capabilities (used by PlanAgent to pick sub-agents)
  capabilities:
    sale_agent:
      capabilities:
        - "Analyze profit, sales, expense, financial, and order data"
    analysis_agent:
      capabilities:
        - "Compute/analyze data returned from other agents"
        - "Aggregations: sum, avg, count, group statistics"
        - "Comparisons: WoW/YoY, growth rate, variance"
        - "Derived metrics: ratios, shares, rankings, trends"
        - "Data processing: cleaning, formatting, filtering, sorting"
      note: "This agent only analyzes with Python code; it does not directly fetch data"

  # Data sources (CSV files and database tables)
  data_sources:
    sale_agent:
      csv:
        - "orders.csv"
        - "products.csv"
      # Default: empty list (only CSV files, no database tables)
      # If you want to use database tables, replace [] with table configurations below
      # Note: Only when tables are configured (non-empty list), the generic_table_mcp service needs to be started
      tables: []
      # Example configurations (uncomment and modify as needed):
      # tables:
      #   # Example 1: Table with auto-inferred dimensions/metrics (mcp field omitted)
      #   - database: "analytics"
      #     table: "fact_sales_daily"
      #   
      #   # Example 2: Table with custom MCP metadata configuration
      #   - database: "analytics"
      #     table: "fact_sales_daily"
      #     mcp:
      #       # required_filters: fields that MUST appear in filters
      #       required_filters:
      #         - "part_dt"
      #       # value_mappings: alias mapping for dimension values
      #       value_mappings:
      #         site:
      #           AU: ["AU", "Australia"]
      #       # dimensions: key is the exact column name in the table,
      #       # value is a short human-friendly description
      #       dimensions:
      #         part_dt: "Date (YYYY-MM-DD)"
      #       # metrics: base or derived metrics
      #       # - Base metric: use an aggregate function over a numeric column
      #       # - Derived metric: use a SQL expression via "formula"
      #       # Supported functions: sum | avg | count | max | min
      #       metrics:
      #         revenue:
      #           description: "Sales revenue"
      #           function: "sum"
      #       # field_hints: format/value hints to help the agent build valid filters
      #       field_hints:
      #         part_dt: "Date format: YYYY-MM-DD"

# RAGFlow Configuration
ragflow:
  base_url: "http://127.0.0.1:9380"
  api_key: "$RAGFLOW_API_KEY"
  # datasets: map from logical name to dataset id; the planner may pick by agent_name
  datasets:
    sale_agent: "DATASET_ID_FOR_SALE"
    common: "DATASET_ID_FOR_COMMON"